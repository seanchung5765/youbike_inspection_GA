<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>YouBike 模擬體驗後台</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    [x-cloak] {
      display: none !important;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-thumb {
      background: #ea580c;
      border-radius: 10px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body
  class="bg-slate-50 flex flex-col h-screen overflow-hidden"
  x-data="{ sidebarOpen: false, userMenuOpen: false }"
  @close-sidebar.window="sidebarOpen = false"
  x-init="init()"
>

  <!-- Header -->
  <header class="h-16 bg-slate-800 text-white flex items-center justify-between px-4 shadow-md z-40 border-b-4 border-orange-600">
    <div class="flex items-center space-x-4">
      <button
        @click="sidebarOpen = true"
        class="p-2 rounded-md hover:bg-orange-600 transition focus:outline-none group"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:scale-110 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

      <div class="text-xl font-black tracking-wider pl-2 text-orange-500">
        YouBike1.0<span class="text-white">模擬體驗後台</span>
      </div>

      <div class="hidden md:block text-slate-400 text-sm border-l border-slate-600 pl-4">
        當前位置：
        <span id="current-location-text" class="text-orange-400 font-bold">
          
        </span>
      </div>
    </div>

    <!-- User -->
    <div class="relative">
      <button
        @click="userMenuOpen = !userMenuOpen; sidebarOpen = false"
        class="flex items-center space-x-2 hover:opacity-80 transition focus:outline-none"
      >
        <div class="text-right hidden sm:block">
          <p id="user-display-name" class="font-bold text-sm leading-tight">讀取中...</p>
          <p id="user-role-badge" class="text-[10px] text-orange-400 font-mono"></p>
        </div>

        <div class="w-9 h-9 rounded-full bg-orange-600 flex items-center justify-center shadow-inner">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
          </svg>
        </div>
      </button>

      <!-- Dropdown -->
      <div
        x-show="userMenuOpen"
        @click.outside="userMenuOpen = false"
        x-cloak
        class="absolute right-0 mt-2 w-48 bg-white border rounded shadow-xl py-1 z-50 text-slate-800 ring-1 ring-black ring-opacity-5"
      >
        <a href="#" class="block px-4 py-2 text-sm hover:bg-orange-50 hover:text-orange-600 transition">
          個人設定
        </a>

        <hr class="my-1 border-slate-100" />

        <button
          onclick="logout()"
          class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition"
        >
          登出系統
        </button>
      </div>
    </div>
  </header>

  <!-- Main Layout -->
  <div class="flex flex-1 overflow-hidden relative">

    <!-- Overlay -->
    <div
      x-show="sidebarOpen"
      x-transition.opacity
      @click="sidebarOpen = false"
      class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm z-40"
      x-cloak
    ></div>

    <!-- Sidebar -->
    <aside
      class="absolute left-0 top-0 h-full w-72 bg-slate-900 text-slate-300 shadow-2xl z-50 transform transition-transform duration-300 ease-in-out"
      :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
    >
      <div class="p-6 flex justify-between items-center border-b border-slate-800 bg-slate-950">
        <div class="flex items-center space-x-2">
          <div class="w-2 h-6 bg-orange-600 rounded-full"></div>
          <span class="text-white font-black text-xl tracking-tight">MENU</span>
        </div>

        <button @click="sidebarOpen = false" class="text-slate-500 hover:text-orange-500 transition">
          ✕
        </button>
      </div>

      <nav class="p-4 space-y-1">
        <p class="text-[10px] text-slate-500 uppercase font-bold px-3 mt-6 mb-2 tracking-widest">
          業務分析報表
        </p>

        <a href="javascript:void(0)" onclick="loadReport(this, '/report/SalesAnalytics')" class="report-link block px-4 py-3 rounded-lg hover:bg-slate-800">
          銷售統計報表
        </a>

        <a href="javascript:void(0)" onclick="loadReport(this, '/report/CustomerGrowth')" class="report-link block px-4 py-3 rounded-lg hover:bg-slate-800">
          客戶增長分析
        </a>

        <!-- ADMIN -->
        <div id="admin-section" class="hidden">
          <p class="text-[10px] text-slate-500 uppercase font-bold px-3 mt-8 mb-2 tracking-widest">
            管理控制台
          </p>

          <a href="javascript:void(0)" onclick="loadReport(this, '/admin/permissions')" class="report-link block px-4 py-3 rounded-lg hover:bg-slate-800">
            權限控制
          </a>
          <a href="javascript:void(0)" onclick="loadReport(this, '/admin/audit-logs')" class="report-link block px-4 py-3 rounded-lg hover:bg-slate-800">
            查詢紀錄
          </a>
          
        </div>
      </nav>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col min-w-0">

      <div id="reportContainer" class="flex-1 w-full overflow-hidden bg-white hidden">
        <iframe id="reportFrame" src="" class="w-full h-full border-none"></iframe>
      </div>

      <div id="resultPlaceholder" class="flex-1 flex flex-col items-center justify-center text-slate-400 bg-white">
        <p class="text-xl font-bold">READY TO ANALYZE</p>
        <p class="text-sm mt-1">請展開左側選單並選取報表</p>
      </div>

    </main>
  </div>

  <script>
  window.currentUser = null;

  async function init() {
    const nameElement = document.getElementById("user-display-name");
    const roleElement = document.getElementById("user-role-badge");
    const adminSection = document.getElementById("admin-section");

    try {
      // 呼叫 API 取得登入資訊
      const res = await fetch("/api/me", { credentials: "include" });

      if (res.ok) {
        const data = await res.json();
        window.currentUser = data.user;

        // 1. 顯示姓名
        nameElement.textContent = data.user?.cn || data.user?.username || "未知用戶";

        // 2. 角色判定：將 role 轉為大寫再比較 (防止後端傳 admin 小寫)
        const userRole = (data.user?.role || "VIEWER").toUpperCase();
        roleElement.textContent = userRole;

        // 3. 顯示管理選單
        if (userRole === "ADMIN") {
          console.log("偵測為管理員，移除 hidden 樣式");
          // 確保移除 hidden 類別
          adminSection.classList.remove("hidden");
          // 雙重保險：如果 CSS 有其他覆蓋，直接強制顯示
          adminSection.style.display = "block"; 
        } else {
          console.log("目前角色為:", userRole, "非 ADMIN");
        }

      } else {
        // API 回傳非 200 (例如 session 過期)
        window.location.href = "/";
      }
    } catch (e) {
      console.error("初始化失敗:", e);
      nameElement.textContent = "API 連線失敗";
    }
  }

  /**
   * 載入報表
   */
  function loadReport(target, url) {
    const frame = document.getElementById("reportFrame");
    const container = document.getElementById("reportContainer");
    const placeholder = document.getElementById("resultPlaceholder");
    const locationText = document.getElementById("current-location-text");
    const allLinks = document.querySelectorAll('.report-link');

    // 清除所有選單的選中樣式，並給當前選單加上亮色
    allLinks.forEach(l => l.classList.remove('bg-orange-600', 'text-white'));
    if (target && target.classList) {
        target.classList.add('bg-orange-600', 'text-white');
        locationText.textContent = target.innerText.trim();
    }

    container.classList.remove("hidden");
    placeholder.classList.add("hidden");
    frame.src = url;

    // 自動關閉側邊欄 (Alpine.js 事件)
    window.dispatchEvent(new CustomEvent('close-sidebar'));
  }

  async function logout() {
    if (!confirm("確定要登出報表系統？")) return;

    try {
        await fetch("/api/logout", {
          method: "POST",
          credentials: "include",
        });
        location.href = "/";
    } catch (e) {
        alert("登出失敗");
    }
  }

  window.onload = init;
</script>

</body>
</html>
