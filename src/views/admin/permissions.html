<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>權限管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script defer src="/js/admin-permissions.js"></script>
</head>

<body class="bg-slate-100 min-h-screen p-6">
<div class="p-8 font-sans text-slate-800" x-data="permissionManager()">
    <h2 class="text-2xl font-black mb-6 border-l-4 border-orange-600 pl-4">帳號角色管理</h2>

    <div class="bg-slate-500 p-4 rounded-t-lg flex items-center space-x-4 shadow-inner">
        <label class="text-white font-bold whitespace-nowrap">帳號資料：</label>
        <div class="relative flex-1 max-w-sm">
            <input type="text" x-model="searchId" @keyup.enter="lookupUser" class="w-full px-4 py-2 rounded border-none focus:ring-2 focus:ring-orange-500 outline-none text-slate-700" placeholder="請輸入公號">
        </div>
        <button @click="lookupUser" :disabled="loading" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-2 rounded font-bold transition flex items-center shadow-md disabled:opacity-50">
            <span x-show="!loading">確定</span>
            <span x-show="loading" class="animate-spin mr-2">🌀</span>
        </button>
    </div>

    <div 
        x-show="showEditor" 
        x-transition 
        class="bg-slate-300 p-6 shadow-lg border-t border-slate-400 mb-8"
    >
        <div class="flex flex-wrap items-end gap-4">
            
            <div class="w-32">
                <label class="block text-xs font-bold text-slate-700 mb-1">姓名</label>
                <div class="bg-slate-100 border border-slate-400 px-3 py-2 rounded h-10 flex items-center text-sm font-medium" x-text="userData.name"></div>
            </div>

            <div class="w-32">
                <label class="block text-xs font-bold text-slate-700 mb-1">公號</label>
                <div class="bg-slate-100 border border-slate-400 px-3 py-2 rounded h-10 flex items-center text-sm font-mono" x-text="userData.empId"></div>
            </div>

            <div class="w-40">
                <label class="block text-xs font-bold text-slate-700 mb-1">目前角色</label>
                <div class="bg-slate-200 border border-slate-400 px-3 py-2 rounded h-10 flex items-center text-xs text-slate-600 italic" x-text="userData.currentRole || '尚未設定'"></div>
            </div>

            <div class="flex-1 min-w-[200px]">
                <label class="block text-xs font-bold text-slate-700 mb-1">修改成的角色</label>
                <select 
                    x-model="selectedRole" 
                    class="w-full bg-white border border-slate-400 px-3 py-2 rounded h-10 text-sm focus:ring-2 focus:ring-orange-500 outline-none cursor-pointer"
                >
                    <option value="">請選擇角色...</option>
                    <template x-for="role in roleOptions" :key="role">
                        <option :value="role" x-text="role"></option>
                    </template>
                </select>
            </div>

            <div class="flex items-center space-x-2">
                <button 
                    @click="submitRole"
                    :disabled="!selectedRole || loading"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-6 h-10 rounded font-bold shadow transition active:scale-95 disabled:bg-slate-400 text-sm"
                >
                    送出
                </button>

                <button 
                    @click="deleteRole"
                    x-show="userData.currentRole"
                    :disabled="loading"
                    class="bg-red-500 hover:bg-red-600 text-white px-4 h-10 rounded font-bold shadow transition active:scale-95 text-sm"
                >
                    刪除
                </button>
            </div>
        </div>
        
        <div x-show="message" x-transition class="mt-4 text-sm font-bold text-green-700" x-text="message"></div>
    </div>

    <div class="mt-12">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2 text-orange-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
                目前權限名單總覽
            </h3>
            <button @click="fetchUserList" class="text-blue-600 hover:underline text-sm">🔄 刷新列表</button>
        </div>

        <div class="bg-white rounded-lg shadow overflow-hidden border border-slate-200">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-800 text-white text-sm uppercase tracking-wider">
                    <tr>
                        <th class="px-6 py-4 font-bold">姓名</th>
                        <th class="px-6 py-4 font-bold">公號</th>
                        <th class="px-6 py-4 font-bold">所屬角色</th>
                        <th class="px-6 py-4 font-bold text-center">操作</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    <template x-for="user in userList" :key="user.empId">
                        <tr class="hover:bg-slate-50 transition">
                            <td class="px-6 py-4 font-medium text-slate-700" x-text="user.name"></td>
                            <td class="px-6 py-4 font-mono text-sm" x-text="user.empId"></td>
                            <td class="px-6 py-4">
                                <span class="px-3 py-1 rounded-full text-xs font-bold" 
                                      :class="user.role === '管理員' ? 'bg-orange-100 text-orange-700' : 'bg-blue-100 text-blue-700'"
                                      x-text="user.role"></span>
                            </td>
                            <td class="px-6 py-4 text-center">
                                <button @click="editFromList(user.empId)" class="text-indigo-600 hover:text-indigo-900 font-bold text-sm">編輯權限</button>
                            </td>
                        </tr>
                    </template>
                    <template x-if="userList.length === 0">
                        <tr>
                            <td colspan="4" class="px-6 py-10 text-center text-slate-400">目前尚無任何權限設定</td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
<script>
function permissionManager() {
    return {
        searchId: '',
        loading: false,
        showEditor: false,
        selectedRole: '',
        userData: { name: '', empId: '', currentRole: '' },
        // 範例名單資料
        userList: [
            { name: '王承甫', empId: 'GB4860', role: '客服TEAM' },
            { name: '張小明', empId: 'GB1234', role: '管理員' },
            { name: '李大同', empId: 'GB9999', role: '營運處長' }
        ],
        roleOptions: ['客服TEAM', '營運處長', '財務TEAM', '管理員', '維調主任', '研發主管'],

        async lookupUser() {
            if (!this.searchId) return;
            this.loading = true;
            await new Promise(r => setTimeout(r, 500)); // 模擬 API
            
            // 邏輯同前，查到後 showEditor = true
            this.userData = { name: '王承甫', empId: this.searchId.toUpperCase(), currentRole: '客服TEAM' };
            this.showEditor = true;
            this.loading = false;
        },

        editFromList(id) {
            this.searchId = id;
            this.lookupUser();
            window.scrollTo({ top: 0, behavior: 'smooth' }); // 平滑捲動回上方
        },

        async fetchUserList() {
            // 未來串接 API: GET /api/admin/users
            console.log("重新獲取權限列表...");
        }
    }
}
</script>
</html>
