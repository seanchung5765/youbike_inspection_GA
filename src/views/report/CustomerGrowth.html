<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>成長趨勢報表</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white p-6">

  <h1 class="text-xl font-bold mb-4">📈 成長趨勢報表</h1>

  <!-- 篩選 -->
  <div class="flex gap-4 mb-4">

    <select id="regionFilter" class="border p-2 rounded">
      <option value="">全部地區</option>
      <option value="台北">台北市</option>
      <option value="桃園">桃園市</option>
      <option value="新竹">新竹市</option>
      <option value="苗栗">苗栗縣</option>
      <option value="台中">台中市</option>
      <option value="高雄">高雄市</option>
    </select>

    <button onclick="loadData()"
      class="bg-slate-900 text-white px-4 py-2 rounded">
      查詢
    </button>

  </div>

  <!-- 表格 -->
  <div class="overflow-auto border rounded">
    <table class="w-full text-sm text-left">
      <thead class="bg-slate-100">
        <tr>
          <th class="p-2">地區</th>
          <th class="p-2">月份</th>
          <th class="p-2">用戶數</th>
          <th class="p-2">成長率</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <script>
    let currentUser = null;

    async function init() {
      try {
        const res = await fetch("/api/me", {
          credentials: "include"
        });

        if (!res.ok) {
          window.parent.location.href = "/";
          return;
        }

        const data = await res.json();
        currentUser = data.user;

        applyScopeToDropdown();
        loadData();

      } catch (err) {
        console.error(err);
        window.parent.location.href = "/";
      }
    }

    // 限制地區選單
    function applyScopeToDropdown() {
      const select = document.getElementById("regionFilter");

      if (!currentUser) return;

      // ADMIN 不限制
      if (currentUser.scope === "ALL") return;

      const allowed = currentUser.scope || [];

      Array.from(select.options).forEach(opt => {
        if (opt.value && !allowed.includes(opt.value)) {
          opt.remove();
        }
      });
    }

    // 查詢資料
    async function loadData() {
      const region = document.getElementById("regionFilter").value;

      try {
        const res = await fetch(`/api/reports?region=${region}`, {
          credentials: "include"
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.msg || "查詢失敗");
          return;
        }

        renderTable(data.data);

      } catch (err) {
        console.error(err);
        alert("查詢錯誤");
      }
    }

    // 渲染表格
    function renderTable(rows) {
      const tbody = document.getElementById("tableBody");
      tbody.innerHTML = "";

      if (!rows || rows.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="4" class="text-center p-4 text-slate-400">
              無資料
            </td>
          </tr>
        `;
        return;
      }

      rows.forEach(r => {
        const tr = document.createElement("tr");
        tr.className = "border-t";

        tr.innerHTML = `
          <td class="p-2">${r.region}</td>
          <td class="p-2">${r.month}</td>
          <td class="p-2">${r.users}</td>
          <td class="p-2 text-green-600">${r.growth}%</td>
        `;

        tbody.appendChild(tr);
      });
    }

    init();
  </script>

</body>
</html>
