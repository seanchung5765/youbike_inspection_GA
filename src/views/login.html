<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>YouBike LDAP Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-50 to-slate-200 flex items-center justify-center p-6">
  <div class="w-full max-w-md">
    <div class="bg-white/90 backdrop-blur rounded-2xl shadow-xl border border-slate-200 p-8">
      <div class="flex items-center gap-3">
        <div class="h-10 w-10 rounded-xl bg-slate-900 text-white grid place-items-center font-bold">YB</div>
        <div>
          <h1 class="text-xl font-semibold text-slate-900">YouBike 登入</h1>
        </div>
      </div>

      <div class="mt-6 space-y-4">
        <div>
          <label class="text-sm font-medium text-slate-700">帳號</label>
          <input
            id="u"
            autocomplete="username"
            class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-4 focus:ring-slate-200 focus:border-slate-400"
            placeholder="例如：GB1234"
          />
        </div>

        <div>
          <label class="text-sm font-medium text-slate-700">密碼</label>

          <div class="relative mt-1">
            <input
              id="p"
              type="password"
              autocomplete="current-password"
              class="w-full rounded-xl border border-slate-300 px-4 py-3 pr-12 outline-none focus:ring-4 focus:ring-slate-200 focus:border-slate-400"
              placeholder="••••••••"
            />

            <button
              type="button"
              id="togglePwd"
              onmousedown="showPassword()"
              onmouseup="hidePassword()"
              onmouseleave="hidePassword()"
              ontouchstart="showPassword()"
              ontouchend="hidePassword()"
              class="absolute inset-y-0 right-3 flex items-center text-slate-500 hover:text-slate-700"
              aria-label="顯示密碼"
            >
              👁
            </button>
          </div>
        </div>

        <button
          id="btn"
          onclick="login()"
          class="w-full rounded-xl bg-slate-900 text-white py-3 font-semibold hover:bg-slate-800 active:bg-slate-950 transition"
        >
          登入
        </button>

        <p id="msg" class="text-sm text-rose-600 min-h-[20px]"></p>

        <div class="pt-4 border-t border-slate-200 text-xs text-slate-500">
          <span class="font-mono text-slate-700">helloworld</span>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
