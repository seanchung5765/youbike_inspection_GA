<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
  <title>YouBike 模擬體驗後台 - 角色權限管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #ea580c; border-radius: 10px; }
    
    /* 核心優化：統一標籤與文字級距 */
    .role-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 95px;
        padding: 8px 14px;
        border-radius: 12px;
        font-weight: 800;
        font-size: 0.95rem; /* 解決字體太小問題 */
        letter-spacing: 0.5px;
        border: 1.5px solid transparent;
        transition: all 0.2s;
    }
    .badge-front { background-color: #eff6ff; color: #2563eb; border-color: #dbeafe; }
    .badge-back { background-color: #faf5ff; color: #9333ea; border-color: #f3e8ff; }

    .input-label {
        font-size: 0.85rem;
        font-weight: 900;
        color: #64748b;
        letter-spacing: 1px;
        margin-bottom: 0.5rem;
        display: block;
        text-transform: uppercase;
    }

    /* 漸層與陰影微調 */
    .card-shadow {
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>

<body class="bg-slate-50 flex flex-col h-screen overflow-hidden text-base" x-data="permissionManager()">
  
  <div x-show="showToast" x-transition class="fixed top-10 left-0 right-0 z-[100] flex justify-center pointer-events-none" x-cloak>
    <div class="bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl flex items-center gap-3 border border-slate-700">
      <div class="bg-green-500 rounded-full p-1">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
      </div>
      <span class="font-bold text-lg">設定已儲存成功</span>
    </div>
  </div>

  <div class="flex flex-1 overflow-hidden relative">
    <main class="flex-1 overflow-y-auto p-6 md:p-12 bg-[#f8fafc] custom-scrollbar">
      <div class="max-w-6xl mx-auto">
        
        <div class="mb-10 flex items-center justify-between">
            <div>
                <h2 class="text-3xl font-black text-slate-800 tracking-tight">人員權限管理</h2>
                <p class="text-slate-400 font-medium mt-1">管理各營運處的人員計分與後臺存取角色</p>
            </div>

        </div>

        <div class="bg-white p-8 rounded-[2rem] card-shadow border border-slate-100 mb-8">
            <div class="flex flex-col md:flex-row gap-6 items-end">
                <div class="flex-1 w-full relative" @click.away="showSuggestions = false">
                    <label class="input-label">查詢或新增人員工號</label>
                    <div class="relative group">
                        <input type="text" x-model="searchId" 
                            @input="filterUsers"
                            @focus="showSuggestions = true"
                            @keyup.enter="lookupUser" 
                            class="w-full pl-14 pr-4 py-5 rounded-2xl border-2 border-slate-100 group-hover:border-slate-200 focus:border-orange-500 focus:ring-4 focus:ring-orange-50/50 outline-none text-2xl font-mono transition-all shadow-inner bg-slate-50/50 focus:bg-white" 
                            placeholder="輸入工號或姓名...">
                        <span class="absolute left-5 top-5.5 text-2xl group-focus-within:scale-110 transition">🔍</span>
                    </div>

                    <ul x-show="showSuggestions && filteredUsers.length > 0" 
                        class="absolute z-50 w-full mt-2 bg-white border border-slate-200 rounded-2xl shadow-2xl max-height-60 overflow-y-auto overflow-x-hidden"
                        x-transition x-cloak>
                        <template x-for="user in filteredUsers" :key="user.empId">
                        <li @click="selectUser(user)" 
                            class="px-6 py-4 hover:bg-orange-50 cursor-pointer border-b border-slate-50 last:border-0 flex justify-between items-center transition-colors">
                            <div>
                                <span class="font-black text-slate-900 text-xl" x-text="user.empId"></span>
                                <span class="ml-4 text-slate-700 font-black text-xl" x-text="user.name"></span>
                            </div>
                        </li>
                        </template>
                    </ul>
                </div>
                <button @click="lookupUser" 
                    class="w-full md:w-auto bg-slate-900 hover:bg-black text-white px-12 py-5 rounded-2xl font-black text-xl transition-all active:scale-95 shadow-lg shadow-slate-200">
                    帶入資料
                </button>
            </div>
        </div>

        <div x-show="showEditor" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 transform translate-y-4" class="space-y-6 mb-12" x-cloak>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-white p-8 rounded-[2rem] card-shadow border border-slate-100 relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-5">
                        <svg class="w-20 h-20" fill="currentColor" viewBox="0 0 20 20"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"></path></svg>
                    </div>
                    <h3 class="font-black text-slate-800 text-lg mb-6 flex items-center gap-2">
                        <span class="w-2 h-6 bg-orange-500 rounded-full"></span> 1. 單位設定
                    </h3>
                    <div class="space-y-6">
                        <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100 shadow-inner">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">目前選取人員</label>
                            <div class="text-3xl font-black text-slate-900 mt-1" x-text="userData.name"></div>
                            <div class="text-sm font-mono font-bold text-orange-600" x-text="userData.empId"></div>
                        </div>
                        <div class="space-y-4">
                            <select x-model="selectedRegion" class="w-full bg-white border-2 border-slate-100 p-4 rounded-xl font-bold text-lg outline-none focus:border-orange-500 transition cursor-pointer">
                                <option value="">選擇營運處</option>
                                <template x-for="(subs, region) in regionData" :key="region"><option :value="region" x-text="region"></option></template>
                            </select>
                            <select x-model="selectedUnit" :disabled="!selectedRegion" class="w-full bg-white border-2 border-slate-100 p-4 rounded-xl font-bold text-lg outline-none focus:border-orange-500 disabled:opacity-50 transition cursor-pointer">
                                <option value="">選擇地區</option>
                                <template x-for="unit in regionData[selectedRegion]" :key="unit"><option :value="unit" x-text="unit"></option></template>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-[2rem] card-shadow border border-slate-100">
                    <h3 class="font-black text-slate-800 text-lg mb-6 flex items-center gap-2">
                        <span class="w-2 h-6 bg-blue-500 rounded-full"></span> 2. 前臺計分角色
                    </h3>
                    <div class="grid grid-cols-1 gap-3">
                        <template x-for="role in frontRoles" :key="role">
                            <label class="flex items-center p-5 rounded-2xl border-2 border-slate-50 hover:border-blue-100 cursor-pointer transition-all has-[:checked]:bg-blue-50 has-[:checked]:border-blue-500 has-[:checked]:shadow-md group">
                                <input type="radio" :value="role" x-model="selectedFrontRole" class="w-6 h-6 text-blue-600 focus:ring-0">
                                <span class="ml-4 font-black text-xl text-slate-700 group-hover:text-blue-700" x-text="role"></span>
                            </label>
                        </template>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-[2rem] card-shadow border border-slate-100 flex flex-col">
                    <h3 class="font-black text-slate-800 text-lg mb-6 flex items-center gap-2">
                        <span class="w-2 h-6 bg-purple-500 rounded-full"></span> 3. 後臺系統權限
                    </h3>
                    <div class="flex-1">
                        <select x-model="selectedBackRole" class="w-full bg-slate-50 border-2 border-slate-100 p-5 rounded-2xl font-black text-2xl outline-none focus:border-purple-500 shadow-inner appearance-none cursor-pointer">
                            <option value="">-- 請選擇 --</option>
                            <template x-for="role in backRoles" :key="role"><option :value="role" x-text="role"></option></template>
                        </select>
                        <div class="mt-6 p-5 bg-slate-50 rounded-2xl border border-dashed border-slate-200">
                            <p class="text-sm text-slate-500 leading-relaxed font-bold">
                                💡 <span class="text-slate-800">提示：</span>管理員權限包含所有報表匯出與系統參數調整。
                            </p>
                        </div>
                    </div>
                    <div class="mt-8 pt-6 border-t border-slate-50 space-y-3">
                        <button @click="submitRole" class="w-full py-5 bg-orange-600 hover:bg-orange-700 text-white font-black text-2xl rounded-2xl shadow-xl shadow-orange-100 transition-all active:scale-95">儲存權限設定</button>
                        <button @click="showEditor = false" class="w-full py-3 text-slate-400 font-bold hover:text-slate-600 transition">取消返回</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] card-shadow border border-slate-100 overflow-hidden">
            <div class="p-8 border-b border-slate-50 flex justify-between items-center bg-slate-50/30">
                <div>
                    <h3 class="font-black text-slate-800 text-xl tracking-tight uppercase">已配置權限的人員名單</h3>
                </div>
                <div class="text-right">
                    <span class="text-xs font-black text-slate-400 block uppercase tracking-widest">已配置人數</span>
                    <span class="text-3xl font-black text-slate-900" x-text="userList.length"></span>
                </div>
            </div>

            <div class="hidden md:block">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/50">
                            <th class="px-10 py-6 table-head-text">姓名與工號</th>
                            <th class="px-10 py-6 table-head-text">所屬單位</th>
                            <th class="px-10 py-6 table-head-text">角色配置 (前 / 後)</th>
                            <th class="px-10 py-6 table-head-text text-right">操作</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50">
                        <template x-for="user in userList" :key="user.empId">
                            <tr class="hover:bg-slate-50/80 transition-colors group">
                                <td class="px-10 py-8">
                                    <div class="font-black text-slate-900 text-xl" x-text="user.name"></div>
                                    <div class="text-sm font-mono font-bold text-orange-600 mt-1" x-text="user.empId"></div>
                                </td>
                                <td class="px-10 py-8">
                                    <div class="text-lg font-bold text-slate-700" x-text="user.region"></div>
                                    <div class="text-sm font-medium text-slate-400" x-text="user.unit"></div>
                                </td>
                                <td class="px-10 py-8">
                                    <div class="flex items-center gap-3">
                                        <span class="role-badge badge-front" x-text="user.frontRole"></span>
                                        <span class="role-badge badge-back" x-text="user.backRole"></span>
                                    </div>
                                </td>
                                <td class="px-10 py-8 text-right">
                                    <button @click="editFromList(user)" 
                                        class="bg-white border-2 border-slate-100 hover:border-orange-500 hover:text-orange-600 px-6 py-2.5 rounded-xl font-black text-sm transition-all shadow-sm">
                                        編輯
                                    </button>
                                    <button @click="deletePermission(user)" 
                                                class="text-red-600 hover:text-red-800 font-medium">
                                            刪除
                                    </button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>

            </div>

      </div>
    </main>
  </div>

  <script src="/services/admin/Permissions.js"></script>
</body>
</html>
